name: Security Audit & SAST
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd server && npm ci
          cd ../src && npm ci

      - name: Audit Backend Dependencies (Supply Chain)
        run: cd server && npm audit --audit-level=high

      - name: Audit Frontend Dependencies (Supply Chain)
        run: cd src && npm audit --audit-level=high

      # Simulated Static Application Security Testing (SAST)
      - name: Run Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # Advanced: Use Trivy for deep vulnerability hunting
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
